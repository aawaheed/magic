name: Build and publish Docker images

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Extract version from tag
      - name: Get tag version number
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      # Setup QEMU (required for ARM builds)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # Setup Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Login to DockerHub
      - name: Login to DockerHub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # Minify scripts
      - name: Minifying Chatbot scripts
        uses: nizarmah/auto-minify@v2.1
        with:
          directory: './backend/files/system/openai/front.files/chat'
          output: './backend/files/system/openai/front.files/chat'

      - name: Minifying CAPTCHA script
        uses: nizarmah/auto-minify@v2.1
        with:
          directory: './backend/files/system/misc'
          output: './backend/files/system/misc'

      # ==========================
      # Build & Push Backend
      # ==========================
      - name: Build and push backend (multi-arch)
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            -f ./docker.backend \
            -t servergardens/magic-backend:latest \
            -t servergardens/magic-backend:${{ steps.get_version.outputs.VERSION }} \
            --push .

      # ==========================
      # Build & Push Frontend
      # ==========================
      - name: Build and push frontend (multi-arch)
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            -f ./docker.frontend \
            -t servergardens/magic-frontend:latest \
            -t servergardens/magic-frontend:${{ steps.get_version.outputs.VERSION }} \
            --push .

      # ==========================
      # Zip + Upload
      # ==========================
      - name: Zip and upload release
        run: |
          zip -r magic-${{ steps.get_version.outputs.VERSION }}.zip *
          curl -X PUT \
            -H "Content-Type: multipart/form-data" \
            -H "Authorization: Bearer ${{ secrets.API_TOKEN }}" \
            -F "folder=/etc/releases/" \
            -F "file=@magic-${{ steps.get_version.outputs.VERSION }}.zip" \
            "https://ainiro.io/magic/system/file-system/file"

          zip -r magic.zip *
          curl -X PUT \
            -H "Content-Type: multipart/form-data" \
            -H "Authorization: Bearer ${{ secrets.API_TOKEN }}" \
            -F "folder=/etc/releases/" \
            -F "file=@magic.zip" \
            "https://ainiro.io/magic/system/file-system/file"
